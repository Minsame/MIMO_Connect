llm:
  active_provider: deepseek
  defaults:
    temperature: 0
    max_tokens: 2048
    timeout: 30
  providers:
    deepseek:
      base_url: https://api.deepseek.com
      model: deepseek-chat
      supports_json_mode: true
      supports_caching: false
      models:
      - name: deepseek-chat
        alias: default
        context_window: 64000
      - name: deepseek-flash
        alias: fast
        context_window: 64000
      - name: deepseek-reasoner
        alias: reasoning
        context_window: 64000
    openai:
      base_url: https://api.openai.com/v1
      model: gpt-4o
      supports_json_mode: true
      supports_caching: true
      models:
      - name: gpt-4o
        alias: default
        context_window: 128000
      - name: gpt-4o-mini
        alias: fast
        context_window: 128000
    anthropic:
      base_url: https://api.anthropic.com
      model: claude-sonnet-4-20250514
      supports_json_mode: false
      supports_caching: true
      models:
      - name: claude-sonnet-4-20250514
        alias: default
        context_window: 200000
    siliconflow:
      base_url: https://api.siliconflow.cn/v1
      model: deepseek-ai/DeepSeek-V4-Flash
      supports_json_mode: true
      supports_caching: false
      models:
      - name: deepseek-ai/DeepSeek-V4-Flash
        alias: default
        context_window: 64000
    dashscope:
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model: deepseek-ai/DeepSeek-V4-Flash
      supports_json_mode: true
      supports_caching: false
  task_routing:
    intent_recognition: deepseek
    state_classification: deepseek
    general_chat: openai
tts:
  primary_engine: mimo
  fallback_order:
  - mimo
  - windows
  - edge-tts
  mimo:
    api_url: https://api.xiaomimimo.com/v1
    model: mimo-v2.5-tts
    voice: mimo_default
    models:
    - name: mimo-v2.5-tts
      description: 使用预置音色进行语音合成
      voices:
      - mimo_default
      - 冰糖
      - 茉莉
      - 苏打
      - 白桦
      - Mia
      - Chloe
      - Milo
      - Dean
    - name: mimo-v2.5-tts-voicedesign
      description: 通过文本描述定制音色
    - name: mimo-v2.5-tts-voiceclone
      description: 基于音频样本复刻音色
  windows:
    backend: auto
    voice_gender: female
    rate: 2
    volume: 80
  edge:
    voice: zh-CN-XiaoxiaoNeural
    rate: +0%
    volume: +0%
asr:
  engine: whisper
  vad:
    enabled: true
    silence_threshold: 0.5
    min_speech_duration: 0.3
    max_speech_duration: 30
  whisper:
    model: base
    language: zh
    device: cpu
cli:
  supported_clis:
  - name: mimo-code
    command: mimo
    args: []
    description: MiMo Code CLI
  - name: hermes
    command: hermes
    args: []
    description: Hermes CLI
  active_cli: mimo-code
  pty:
    ansi_cleaning: true
    encoding: utf-8
    timeout: 30
state_machine:
  transitions:
    IDLE:
    - PLANNING
    PLANNING:
    - WAITING_APPROVAL
    WAITING_APPROVAL:
    - BUILDING
    - PLANNING
    BUILDING:
    - COMPLETED
    - ERROR
    - WAITING_APPROVAL
    ERROR:
    - IDLE
    COMPLETED:
    - IDLE
  initial_state: IDLE
logging:
  level: INFO
  file: mimo_connect.log
  max_size: 10MB
  backup_count: 5
prompts:
  user_intent: prompts/user_intent.txt
  cli_state: prompts/cli_state.txt
  cli_optimization: prompts/cli_optimization.txt
  error_conversion: prompts/error_conversion.txt
